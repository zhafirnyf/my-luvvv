name: Configure GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  configure-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Configure GitHub Pages source to gh-pages
        run: |
          echo "Calling Pages API to set source branch to gh-pages"
          repo="${{ github.repository }}"
          curl -s -X PUT \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$repo/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' \
            | jq || true
